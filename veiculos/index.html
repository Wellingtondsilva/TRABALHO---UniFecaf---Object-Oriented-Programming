<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Veículos</title>

    <style>

        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        input {
            margin: 5px;
            padding: 5px;
        }

        button {
            margin: 5px;
            padding: 6px 10px;
            cursor: pointer;
        }

        table {
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
            width: 100%;
        }

        th, td {
            padding: 8px 12px;
            border: 1px solid #ccc;
        }

        th {
            background: #ddd;
        }

    </style>

</head>

<body>

    <h1>🚗 Sistema de Gestão de Veículos</h1>

    <!-- CADASTRO -->

    <h2>➕ Cadastrar / Editar Veículo</h2>

    <form id="formCadastro">

        <input type="text" id="modelo" placeholder="Modelo" required>

        <input type="text" id="marca" placeholder="Marca" required>

        <input type="number" id="ano" placeholder="Ano" required>

        <input type="text" id="cor" placeholder="Cor">

        <input type="number" id="preco" placeholder="Preço">

        <input type="number" id="km" placeholder="Quilometragem">

        <input type="text" id="status" placeholder="Status">

        <button type="submit">Salvar</button>

    </form>

    <!-- FILTROS -->

    <h2>🔎 Buscar Veículos</h2>

    <input type="text" id="fMarca" placeholder="Marca">

    <input type="text" id="fModelo" placeholder="Modelo">

    <input type="number" id="fAno" placeholder="Ano">

    <input type="number" id="fPrecoMin" placeholder="Preço Min">

    <input type="number" id="fPrecoMax" placeholder="Preço Max">

    <input type="text" id="fStatus" placeholder="Status">

    <button onclick="filtrar()">Buscar</button>

    <button onclick="listar()">Limpar</button>

    <!-- LISTA -->

    <h2>📋 Lista de Veículos</h2>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Modelo</th>
                <th>Marca</th>
                <th>Ano</th>
                <th>Preço</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>

        </thead>

        <tbody id="tabela"></tbody>

    </table>

<script>

const API = "http://localhost:8080/veiculos";

// CONTROLE DE EDIÇÃO
let editandoId = null;

// ================= LISTAR =================
function listar() {

    fetch(API)

    .then(res => res.json())

    .then(data => {

        const tabela = document.getElementById("tabela");

        tabela.innerHTML = "";

        data.forEach(v => {

            tabela.innerHTML += `

                <tr>

                    <td>${v.id}</td>

                    <td>${v.modelo}</td>

                    <td>${v.marca}</td>

                    <td>${v.ano}</td>

                    <td>${v.preco}</td>

                    <td>${v.status}</td>

                    <td>

                        <button onclick="editar(${v.id})">
                            Editar
                        </button>

                        <button onclick="deletar(${v.id})">
                            Excluir
                        </button>

                    </td>

                </tr>

            `;
        });
    })

    .catch(err => alert("Erro ao carregar dados: " + err));
}

// ================= CADASTRAR / EDITAR =================
document.getElementById("formCadastro")

.addEventListener("submit", function(e) {

    e.preventDefault();

    const veiculo = {

        modelo: document.getElementById("modelo").value,

        marca: document.getElementById("marca").value,

        ano: document.getElementById("ano").value,

        cor: document.getElementById("cor").value,

        preco: document.getElementById("preco").value,

        quilometragem: document.getElementById("km").value,

        status: document.getElementById("status").value
    };

    // ===== EDITAR =====
    if(editandoId !== null) {

        fetch(`${API}/${editandoId}`, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(veiculo)

        })

        .then(() => {

            alert("Veículo atualizado!");

            listar();

            limparFormulario();

            editandoId = null;
        })

        .catch(err => alert("Erro ao atualizar: " + err));

    } else {

        // ===== CADASTRAR =====
        fetch(API, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(veiculo)

        })

        .then(() => {

            alert("Veículo cadastrado!");

            listar();

            limparFormulario();
        })

        .catch(err => alert("Erro ao cadastrar: " + err));
    }
});

// ================= EDITAR =================
function editar(id) {

    fetch(API)

    .then(res => res.json())

    .then(lista => {

        const veiculo = lista.find(v => v.id === id);

        if(!veiculo) {

            alert("Veículo não encontrado");

            return;
        }

        // preencher formulário
        document.getElementById("modelo").value = veiculo.modelo;

        document.getElementById("marca").value = veiculo.marca;

        document.getElementById("ano").value = veiculo.ano;

        document.getElementById("cor").value = veiculo.cor;

        document.getElementById("preco").value = veiculo.preco;

        document.getElementById("km").value = veiculo.quilometragem;

        document.getElementById("status").value = veiculo.status;

        editandoId = id;

        // sobe tela
        window.scrollTo({

            top: 0,

            behavior: "smooth"
        });
    })

    .catch(err => alert("Erro ao editar: " + err));
}

// ================= DELETAR =================
function deletar(id) {

    if(confirm("Deseja excluir este veículo?")) {

        fetch(`${API}/${id}`, {

            method: "DELETE"
        })

        .then(() => {

            alert("Veículo excluído!");

            listar();
        })

        .catch(err => alert("Erro ao deletar: " + err));
    }
}

// ================= FILTRAR =================
function filtrar() {

    let url = `${API}/filtro?`;

    if(document.getElementById("fMarca").value)
        url += `marca=${document.getElementById("fMarca").value}&`;

    if(document.getElementById("fModelo").value)
        url += `modelo=${document.getElementById("fModelo").value}&`;

    if(document.getElementById("fAno").value)
        url += `ano=${document.getElementById("fAno").value}&`;

    if(document.getElementById("fPrecoMin").value)
        url += `precoMin=${document.getElementById("fPrecoMin").value}&`;

    if(document.getElementById("fPrecoMax").value)
        url += `precoMax=${document.getElementById("fPrecoMax").value}&`;

    if(document.getElementById("fStatus").value)
        url += `status=${document.getElementById("fStatus").value}&`;

    fetch(url)

    .then(res => res.json())

    .then(data => {

        const tabela = document.getElementById("tabela");

        tabela.innerHTML = "";

        data.forEach(v => {

            tabela.innerHTML += `

                <tr>

                    <td>${v.id}</td>

                    <td>${v.modelo}</td>

                    <td>${v.marca}</td>

                    <td>${v.ano}</td>

                    <td>${v.preco}</td>

                    <td>${v.status}</td>

                    <td>

                        <button onclick="editar(${v.id})">
                            Editar
                        </button>

                        <button onclick="deletar(${v.id})">
                            Excluir
                        </button>

                    </td>

                </tr>

            `;
        });
    })

    .catch(err => alert("Erro ao filtrar: " + err));
}

// ================= LIMPAR FORM =================
function limparFormulario() {

    document.getElementById("formCadastro").reset();
}

// ================= INICIAR =================
listar();

</script>

</body>
</html>
